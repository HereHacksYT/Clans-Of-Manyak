<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Of Manyak 3D</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; font-family: sans-serif; overflow: hidden; color: white; user-select: none; }
        .box { background: rgba(40, 40, 40, 0.95); padding: 25px; border-radius: 12px; max-width: 340px; margin: 120px auto; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.7); z-index: 20; position: relative; border: 2px solid #ff9f43; }
        
        .input-group { position: relative; width: 90%; margin: 0 auto 15px auto; }
        input { padding: 12px; width: 100%; border-radius: 6px; border: 1px solid #555; background: #2b2b2b; color: white; font-size: 16px; box-sizing: border-box; }
        .goz-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #ff9f43; cursor: pointer; font-size: 18px; z-index: 30; padding: 5px; }
        
        button.main-btn { padding: 12px 25px; background: #ff9f43; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px; width: 90%; }

        #menu-toggle { position: absolute; top: 15px; right: 15px; background: #ff9f43; border: 2px solid white; color: white; font-size: 24px; padding: 5px 12px; border-radius: 8px; cursor: pointer; z-index: 15; display: none; }
        
        #ui-layer { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 10px; display: none; border: 1px solid #555; z-index: 10; pointer-events: none; }
        .stat { font-size: 15px; margin: 4px 0; font-weight: bold; }
        .gold { color: #f1c40f; }
        .elixir { color: #9b59b6; }

        #main-panel { position: absolute; top: 70px; right: 15px; background: rgba(30,30,30,0.95); border: 2px solid #ff9f43; border-radius: 10px; width: 300px; padding: 15px; display: none; z-index: 14; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .tab-buttons { display: flex; margin-bottom: 10px; gap: 5px; }
        .tab-btn { flex: 1; padding: 8px; background: #444; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .tab-btn.active { background: #ff9f43; }
        
        #chat-section { display: none; flex-direction: column; height: 200px; }
        #chat-messages { flex: 1; overflow-y: auto; font-size: 13px; margin-bottom: 5px; background: #222; padding: 5px; border-radius: 4px; }
        .chat-input-group { display: flex; gap: 5px; }
        #chat-input { flex: 1; padding: 6px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; }

        #shop-section { display: none; }
        .shop-category { font-size: 14px; font-weight: bold; margin: 10px 0 5px 0; color: #ff9f43; text-align: left; }
        .scroll-wrapper { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 8px; scroll-behavior: smooth; }
        .shop-card { min-width: 110px; background: #444; padding: 10px; border-radius: 8px; border: 1px solid #666; text-align: center; cursor: pointer; transition: 0.2s; }
        .shop-card:hover { border-color: #ff9f43; background: #555; }
        .card-title { font-size: 13px; font-weight: bold; }
        .card-price { font-size: 11px; margin-top: 3px; }

        #build-overlay { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(44, 62, 80, 0.95); padding: 10px 20px; border-radius: 20px; font-weight: bold; border: 2px solid #ff9f43; display: none; z-index: 10; pointer-events: none; }
        
        #confirm-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: none; gap: 15px; }
        .confirm-btn { padding: 15px 30px; font-size: 18px; font-weight: bold; border: 2px solid white; border-radius: 12px; cursor: pointer; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #btn-yes { background: #2ecc71; }
        #btn-no { background: #e74c3c; }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="login-box" class="box">
        <h2>⚔️ Clash Of Manyak ⚔️</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Kullanıcı Adı...">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Şifre...">
            <button type="button" class="goz-btn" onclick="sifreyiGosterGizle(event)">👁️</button>
        </div>
        <br>
        <button type="button" class="main-btn" onclick="sifreliGirisYap(event)">Köyüme Bağlan (3D)</button>
    </div>

    <button id="menu-toggle" onclick="toggleMenu(event)">☰</button>

    <div id="ui-layer">
        <div class="stat">Şef: <span id="ui-name" style="color:#54a0ff;"></span></div>
        <div class="stat gold">🪙 Altın: <span id="ui-gold">0</span></div>
        <div class="stat elixir">🧪 İksir: <span id="ui-elixir">0</span></div>
        <div class="stat">🏛️ Belediye: <span id="ui-th">1</span>. Lvl</div>
        <div id="troop-counts" style="font-size:11px; color:#aaa; margin-top:5px;"></div>
    </div>

    <div id="build-overlay">🔨 Yer seçin (Haritaya dokunun)</div>

    <div id="confirm-panel" 
         onmouseenter="uiKilitle(true)" onmouseleave="uiKilitle(false)"
         ontouchstart="uiKilitle(true)"
         onclick="event.stopPropagation()">
        <button id="btn-yes" class="confirm-btn" onclick="insaatiOnayla(event)">✅ Kurulumu Onayla</button>
        <button id="btn-no" class="confirm-btn" onclick="insaatiIptalEt(event)">❌ İptal</button>
    </div>

    <div id="main-panel" onmouseenter="uiKilitle(true)" onmouseleave="uiKilitle(false)" ontouchstart="uiKilitle(true)" onclick="event.stopPropagation()">
        <div class="tab-buttons">
            <button class="tab-btn active" id="btn-shop" onclick="switchTab('shop')">🛒 Dükkan</button>
            <button class="tab-btn" id="btn-chat" onclick="switchTab('chat')">💬 Sohbet</button>
        </div>

        <div id="chat-section">
            <div id="chat-messages"></div>
            <div class="chat-input-group">
                <input type="text" id="chat-input" placeholder="Yazın...">
                <button style="background:#ff9f43; border:none; color:white; font-weight:bold; border-radius:4px; padding:0 8px;" onclick="mesajGonder()">Söyle</button>
            </div>
        </div>

        <div id="shop-section">
            <div class="shop-category">🏢 BİNALAR</div>
            <div class="scroll-wrapper">
                <div class="shop-card" onclick="secBina('kanon', 600, 'gold', event)">
                    <div class="card-title">☄️ Havan</div>
                    <div class="card-price">🪙 600 Altın</div>
                </div>
                <div class="shop-card" onclick="secBina('kisla', 800, 'elixir', event)">
                    <div class="card-title">⛺ Asker Kışlası</div>
                    <div class="card-price">🧪 800 İksir</div>
                </div>
                <div class="shop-card" onclick="secBina('duvar', 100, 'gold', event)">
                    <div class="card-title">🧱 Defans Duvarı</div>
                    <div class="card-price">🪙 100 Altın</div>
                </div>
            </div>

            <div class="shop-category">🔨 DÜZENLEME</div>
            <div class="scroll-wrapper">
                <div class="shop-card" style="border: 1px solid #e74c3c;" onclick="yikimModunuAc(event)">
                    <div class="card-title" style="color: #e74c3c;">💥 Bina Yık</div>
                    <div class="card-price">%50 İade Al</div>
                </div>
            </div>

            <div class="shop-category">⚔️ ASKERLER</div>
            <div class="scroll-wrapper">
                <div class="shop-card" onclick="satinAlAsker('barbar', 150, event)">
                    <div class="card-title">🦁 Barbar</div>
                    <div class="card-price">🧪 150 İksir</div>
                </div>
                <div class="shop-card" onclick="satinAlAsker('okcu', 200, event)">
                    <div class="card-title">🏹 Okçu</div>
                    <div class="card-price">🧪 200 İksir</div>
                </div>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let oyuncu = null;
        let scene = null, camera = null, renderer = null, zeminMesh = null, gridHelper = null;
        let kameraAcisi = 0; 
        let kameraYaricap = 23; 

        let insaatModu = false;
        let yikimModu = false;
        let seciliInsaatTipi = null;
        let insaatBedeli = 0;
        let insaatParaTipi = '';
        let geciciMesh = null; 
        let geciciX = 0, geciciZ = 0; 

        let uiTiklamaKilidi = false;
        let sahnedekiBinalar = [];

        let havanYanDoku = null, havanUstDoku = null;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function uiKilitle(durum) {
            uiTiklamaKilidi = durum;
        }

        function binalarinFiyatiniBul(tip) {
            if(tip === 'kanon') return { bedel: 600, tip: 'gold' };
            if(tip === 'kisla') return { bedel: 800, tip: 'elixir' };
            if(tip === 'duvar') return { bedel: 100, tip: 'gold' };
            return { bedel: 0, tip: 'gold' };
        }

        function sifreyiGosterGizle(e) {
            if(e) e.stopPropagation();
            const sifreInput = document.getElementById('password');
            sifreInput.type = (sifreInput.type === "password") ? "text" : "password";
        }

        function toggleMenu(e) {
            if(e) e.stopPropagation();
            const panel = document.getElementById('main-panel');
            panel.style.display = (panel.style.display === "block") ? "none" : "block";
            if(panel.style.display === "block") uiKilitle(true);
            else uiKilitle(false);
        }

        function switchTab(tab) {
            document.getElementById('btn-shop').classList.remove('active');
            document.getElementById('btn-chat').classList.remove('active');
            document.getElementById('shop-section').style.display = 'none';
            document.getElementById('chat-section').style.display = 'none';

            if(tab === 'shop') {
                document.getElementById('btn-shop').classList.add('active');
                document.getElementById('shop-section').style.display = 'block';
            } else {
                document.getElementById('btn-chat').classList.add('active');
                document.getElementById('chat-section').style.display = 'flex';
                chatYukle();
            }
        }

        function sifreliGirisYap(e) {
            if(e) e.stopPropagation();
            const isim = document.getElementById('username').value.trim();
            const sifre = document.getElementById('password').value;
            if(!isim || !sifre) return alert("Alanları doldurun!");

            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: isim, password: sifre })
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) return alert(data.error);
                oyuncu = data.player;
                
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('canvas-container').style.display = 'block';
                document.getElementById('ui-layer').style.display = 'block';
                document.getElementById('menu-toggle').style.display = 'block';
                document.getElementById('ui-name').innerText = oyuncu.username;
                
                switchTab('shop');
                uiGuncelle();
                baslat3DHarita();
                
                if(oyuncu.buildings) {
                    oyuncu.buildings.forEach(b => binaKoySahnede3D(b.type, b.x, b.z, false));
                }
                
                setInterval(chatYukle, 3000);
            })
            .catch(() => alert("Sunucu bağlantı hatası!"));
        }

        function uiGuncelle() {
            if(!oyuncu) return;
            document.getElementById('ui-gold').innerText = oyuncu.gold;
            document.getElementById('ui-elixir').innerText = oyuncu.elixir;
            document.getElementById('ui-th').innerText = oyuncu.town_hall;
            if(!oyuncu.troops) oyuncu.troops = { barbar: 0, okcu: 0 };
            document.getElementById('troop-counts').innerHTML = `Ordu: ${oyuncu.troops.barbar || 0} Barbar | ${oyuncu.troops.okcu || 0} Okçu`;
        }

        function koyuKaliciKaydet() {
            if(!oyuncu) return;
            fetch('/save-village', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(oyuncu)
            });
        }

        function satinAlAsker(tip, bedel, e) {
            if(e) e.stopPropagation();
            if(oyuncu.elixir < bedel) return alert("Yetersiz İksir!");
            oyuncu.elixir -= bedel;
            if(!oyuncu.troops) oyuncu.troops = { barbar: 0, okcu: 0 };
            oyuncu.troops[tip] = (oyuncu.troops[tip] || 0) + 1;
            uiGuncelle();
            koyuKaliciKaydet();
        }

        function secBina(tip, bedel, paraTipi, e) {
            if(e) e.stopPropagation();
            if(paraTipi === 'gold' && oyuncu.gold < bedel) return alert("Yetersiz Altın!");
            if(paraTipi === 'elixir' && oyuncu.elixir < bedel) return alert("Yetersiz İksir!");
            
            yikimModu = false;
            seciliInsaatTipi = tip;
            insaatBedeli = bedel;
            insaatParaTipi = paraTipi;
            insaatModu = true;
            
            if(gridHelper) gridHelper.visible = true;
            document.getElementById('build-overlay').innerText = "🔨 Yer seçin (Haritaya dokunun)";
            document.getElementById('build-overlay').style.display = 'block';
            toggleMenu(); 
            setTimeout(() => { uiKilitle(false); }, 300);
        }

        function yikimModunuAc(e) {
            if(e) e.stopPropagation();
            insaatModu = false;
            if(geciciMesh) { scene.remove(geciciMesh); geciciMesh = null; }
            document.getElementById('confirm-panel').style.display = 'none';

            yikimModu = true;
            if(gridHelper) gridHelper.visible = true;
            document.getElementById('build-overlay').innerText = "💥 Yıkılacak binaya dokunun (Kapatmak için ☰)";
            document.getElementById('build-overlay').style.display = 'block';
            toggleMenu();
            setTimeout(() => { uiKilitle(false); }, 300);
        }

        function haritayaTiklandi(clientX, clientY) {
            if(uiTiklamaKilidi) return;

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            if(yikimModu) {
                let kontrolListesi = [];
                sahnedekiBinalar.forEach(b => {
                    b.group.children.forEach(c => {
                        c.userDataParent = b; 
                        kontrolListesi.push(c);
                    });
                });

                const vuruslar = raycaster.intersectObjects(kontrolListesi);
                if(vuruslar.length > 0) {
                    uiKilitle(true);
                    const hedefBina = vuruslar[0].object.userDataParent;
                    
                    if(confirm(`Bu binayı yıkıp yarı fiyatını (%50) geri almak istiyor musunuz?`)) {
                        scene.remove(hedefBina.group);
                        oyuncu.buildings = oyuncu.buildings.filter(b => !(b.x === hedefBina.x && b.z === hedefBina.z));
                        sahnedekiBinalar = sahnedekiBinalar.filter(b => b !== hedefBina);
                        
                        const veri = binalarinFiyatiniBul(hedefBina.type);
                        const iade = Math.floor(veri.bedel / 2);
                        if(veri.tip === 'gold') oyuncu.gold += iade;
                        else oyuncu.elixir += iade;

                        uiGuncelle();
                        koyuKaliciKaydet();
                    }
                    setTimeout(() => { uiKilitle(false); }, 400);
                }
                return;
            }

            if(insaatModu) {
                const intersections = raycaster.intersectObject(zeminMesh);
                if (intersections.length > 0) {
                    const p = intersections[0].point;
                    geciciX = Math.round(p.x);
                    geciciZ = Math.round(p.z);

                    if(Math.abs(geciciX) > 12 || Math.abs(geciciZ) > 12) return;
                    if(Math.abs(geciciX) <= 2 && Math.abs(geciciZ) <= 2) return alert("Belediye binasının üzerine inşaat yapamazsınız!");

                    let yerDolu = oyuncu.buildings && oyuncu.buildings.some(b => b.x === geciciX && b.z === geciciZ);
                    if(yerDolu) return alert("Bu koordinatta zaten bir bina var!");

                    if(geciciMesh) { scene.remove(geciciMesh); geciciMesh = null; }

                    geciciMesh = binaKoySahnede3D(seciliInsaatTipi, geciciX, geciciZ, true);
                    document.getElementById('confirm-panel').style.display = 'flex';
                }
            }
        }

        function insaatiOnayla(e) {
            if(e) { e.stopPropagation(); e.preventDefault(); }
            uiKilitle(true);

            if(geciciMesh) { scene.remove(geciciMesh); geciciMesh = null; } 

            if(insaatParaTipi === 'gold') oyuncu.gold -= insaatBedeli;
            else oyuncu.elixir -= insaatBedeli;

            if(!oyuncu.buildings) oyuncu.buildings = [];
            oyuncu.buildings.push({ type: seciliInsaatTipi, x: geciciX, z: geciciZ });
            
            binaKoySahnede3D(seciliInsaatTipi, geciciX, geciciZ, false);
            
            insaatModu = false;
            if(gridHelper) gridHelper.visible = false; 
            document.getElementById('build-overlay').style.display = 'none';
            document.getElementById('confirm-panel').style.display = 'none';
            
            uiGuncelle();
            koyuKaliciKaydet();
            
            setTimeout(() => { uiKilitle(false); }, 500);
        }

        function insaatiIptalEt(e) {
            if(e) { e.stopPropagation(); e.preventDefault(); }
            uiKilitle(true);

            if(geciciMesh) { scene.remove(geciciMesh); geciciMesh = null; }
            insaatModu = false;
            if(gridHelper) gridHelper.visible = false;
            document.getElementById('build-overlay').style.display = 'none';
            document.getElementById('confirm-panel').style.display = 'none';

            setTimeout(() => { uiKilitle(false); }, 500);
        }

        function binaKoySahnede3D(tip, x, z, isPreview) {
            let meshGroup = new THREE.Group();

            if(tip === 'kanon') {
                let havanGövde;
                if (isPreview) {
                    // Yeşil, yarı saydam ve net kare önizleme küpü
                    havanGövde = new THREE.Mesh(
                        new THREE.BoxGeometry(1.2, 1.2, 1.2), 
                        new THREE.MeshBasicMaterial({ color: 0x2ecc71, transparent: true, opacity: 0.6 })
                    );
                } else {
                    // MeshBasicMaterial kullanarak siyah kalma sorununu tamamen çözüyoruz. Doku gelmese bile taş rengi (0x7f8c8d) kalacak.
                    havanGövde = new THREE.Mesh(
                        new THREE.BoxGeometry(1.2, 1.2, 1.2), 
                        new THREE.MeshBasicMaterial({ color: 0x7f8c8d, map: havanYanDoku })
                    );
                }
                havanGövde.position.y = 0.6;
                meshGroup.add(havanGövde);
            } 
            else if(tip === 'kisla') {
                const cadir = new THREE.Mesh(
                    new THREE.ConeGeometry(0.8, 1.5, 4), 
                    new THREE.MeshBasicMaterial({ color: isPreview ? 0x2ecc71 : 0xe67e22, transparent: isPreview, opacity: isPreview ? 0.6 : 1.0 })
                );
                cadir.position.y = 0.75; cadir.rotation.y = Math.PI/4;
                meshGroup.add(cadir);
            }
            else if(tip === 'duvar') {
                const blok = new THREE.Mesh(
                    new THREE.BoxGeometry(0.9, 0.9, 0.9), 
                    new THREE.MeshBasicMaterial({ color: isPreview ? 0x2ecc71 : 0xbdc3c7, transparent: isPreview, opacity: isPreview ? 0.6 : 1.0 })
                );
                blok.position.y = 0.45;
                meshGroup.add(blok);
            }

            meshGroup.position.set(x, 0.1, z);
            scene.add(meshGroup);

            if(!isPreview) {
                sahnedekiBinalar.push({ type: tip, x: x, z: z, group: meshGroup });
            }

            return meshGroup; 
        }

        function chatYukle() {
            if(!oyuncu || document.getElementById('chat-section').style.display === 'none') return;
            fetch('/chat').then(res => res.json()).then(mesajlar => {
                const kutu = document.getElementById('chat-messages');
                kutu.innerHTML = mesajlar.map(m => `<div><b style="color:#ff9f43;">${m.username}:</b> ${m.message}</div>`).join('');
                kutu.scrollTop = kutu.scrollHeight;
            }).catch(() => {});
        }

        function mesajGonder() {
            const girdi = document.getElementById('chat-input');
            const m = girdi.value.trim(); if(!m || !oyuncu) return;
            fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: oyuncu.username, message: m })
            }).then(() => { girdi.value = ""; chatYukle(); });
        }

        function kameraPozisyonunuGuncelle() {
            camera.position.x = kameraYaricap * Math.sin(kameraAcisi);
            camera.position.z = kameraYaricap * Math.cos(kameraAcisi);
            camera.position.y = 15; 
            camera.lookAt(0, 0, 0);
        }

        function baslat3DHarita() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x2c3e50);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            kameraPozisyonunuGuncelle();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.innerHTML = ""; 
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const isik = new THREE.DirectionalLight(0xffffff, 0.5); isik.position.set(5, 15, 5); scene.add(isik);

            const tLoader = new THREE.TextureLoader(); 
            tLoader.crossOrigin = "anonymous";
            
            havanYanDoku = tLoader.load('https://corsproxy.io/?' + encodeURIComponent('https://r.resimlink.com/VrJl40sboA.jpeg'));
            havanUstDoku = tLoader.load('https://corsproxy.io/?' + encodeURIComponent('https://r.resimlink.com/itHIsPM.png'));

            const cimenDoku = tLoader.load('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjRWESqbt0RlQ4X3MxEJlDLKJcBXOLWjfBzdlhtvEEag&s=10');
            cimenDoku.wrapS = THREE.RepeatWrapping; cimenDoku.wrapT = THREE.RepeatWrapping; cimenDoku.repeat.set(5, 5);

            const altinDoku = tLoader.load('https://r.resimlink.com/BxtsKAY.png');
            const iksirDoku = tLoader.load('https://r.resimlink.com/OSZVT90IfG.png');
            const govdeAhsapDoku = tLoader.load('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhNIvNqD6ne531hKbJso48uu6Xpv1AzHuLqK8d1ygBGw&s=10');
            const catiAhsapDoku = tLoader.load('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRv9uO_U72MdBbhA9fqa1GydbLtvZR-UdpRRwe2rkeZnw&s=10');

            zeminMesh = new THREE.Mesh(new THREE.BoxGeometry(26, 0.2, 26), new THREE.MeshBasicMaterial({ map: cimenDoku }));
            zeminMesh.position.y = -0.1; 
            scene.add(zeminMesh);

            gridHelper = new THREE.GridHelper(26, 26, 0xff9f43, 0xffffff);
            gridHelper.position.y = 0;
            gridHelper.visible = false; 
            scene.add(gridHelper);

            const binaGovde = new THREE.Mesh(new THREE.BoxGeometry(3.5, 2.5, 3.5), new THREE.MeshBasicMaterial({ map: govdeAhsapDoku }));
            binaGovde.position.y = 1.25; scene.add(binaGovde);
            const cati = new THREE.Mesh(new THREE.ConeGeometry(3, 1.8, 4), new THREE.MeshBasicMaterial({ map: catiAhsapDoku }));
            cati.position.y = 3.4; cati.rotation.y = Math.PI / 4; scene.add(cati);

            const altinKup = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshBasicMaterial({ map: altinDoku }));
            altinKup.position.set(-6, 0.75, -6); scene.add(altinKup);
            const iksirSilindir = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 1.8, 16), new THREE.MeshBasicMaterial({ map: iksirDoku }));
            iksirSilindir.position.set(6, 0.9, -6); scene.add(iksirSilindir);

            let tiklandi = false; 
            let eskiX = 0;
            let suruklendiMi = false;

            window.addEventListener('mousedown', (e) => {
                if (uiTiklamaKilidi) return;
                tiklandi = true;
                eskiX = e.clientX;
                suruklendiMi = false;
            });

            window.addEventListener('mouseup', (e) => {
                if (uiTiklamaKilidi) {
                    tiklandi = false;
                    return;
                }
                tiklandi = false;
                if (!suruklendiMi && (insaatModu || yikimModu)) {
                    haritayaTiklandi(e.clientX, e.clientY);
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (uiTiklamaKilidi) return;
                const panelAcik = document.getElementById('main-panel').style.display === "block";
                if(tiklandi && !panelAcik && e.clientX < window.innerWidth - 60) { 
                    let mFark = e.clientX - eskiX;
                    if(Math.abs(mFark) > 4) {
                        suruklendiMi = true; 
                    }
                    kameraAcisi -= mFark * 0.007; 
                    kameraPozisyonunuGuncelle();
                }
                eskiX = e.clientX;
            });

            window.addEventListener('touchstart', (e) => { 
                if (uiTiklamaKilidi) return;
                tiklandi = true; 
                eskiX = e.touches[0].clientX;
                suruklendiMi = false;
            });

            window.addEventListener('touchend', (e) => { 
                if (uiTiklamaKilidi) {
                    tiklandi = false;
                    return;
                }
                tiklandi = false;
                if (!suruklendiMi && (insaatModu || yikimModu) && e.changedTouches.length > 0) {
                    haritayaTiklandi(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                }
            });

            window.addEventListener('touchmove', (e) => {
                if (uiTiklamaKilidi) return;
                const panelAcik = document.getElementById('main-panel').style.display === "block";
                if(tiklandi && !panelAcik) {
                    let fark = e.touches[0].clientX - eskiX;
                    if(Math.abs(fark) > 4) {
                        suruklendiMi = true;
                    }
                    kameraAcisi -= fark * 0.007;
                    kameraPozisyonunuGuncelle();
                    eskiX = e.touches[0].clientX;
                }
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            function renderDongusu() {
                requestAnimationFrame(renderDongusu);
                altinKup.rotation.y += 0.01;
                iksirSilindir.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            renderDongusu();
        }
    </script>
</body>
</html>

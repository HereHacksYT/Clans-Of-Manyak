<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Of Manyak</title>
    <style>
        body { background-color: #222; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #333; padding: 20px; border-radius: 10px; max-width: 400px; margin: 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        input { padding: 10px; width: 80%; border-radius: 5px; border: none; margin-bottom: 15px; background: #444; color: white; }
        button { padding: 10px 20px; background: #ff9f43; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .stat { font-size: 18px; margin: 10px 0; font-weight: bold; }
        .gold { color: #f1c40f; }
        .elixir { color: #9b59b6; }
    </style>
</head>
<body>

    <h1>⚔️ Clash Of Manyak ⚔️</h1>
    
    <!-- Giriş ve Şifre Ekranı -->
    <div id="login-box" class="box">
        <h3>Köyüne Giriş Yap veya Kaydol</h3>
        <input type="text" id="username" placeholder="Kullanıcı Adı...">
        <input type="password" id="password" placeholder="Şifre...">
        <br>
        <button onclick="oyunaGir()">Savaşa Katıl!</button>
    </div>

    <!-- Köy Ekranı -->
    <div id="koy-box" class="box" style="display: none;">
        <h2>Şef <span id="koy-sahibi" style="color: #54a0ff;"></span> Köyü</h2>
        <div class="stat gold">🪙 Altın: <span id="gold-txt">0</span></div>
        <div class="stat elixir">🧪 İksir: <span id="elixir-txt">0</span></div>
        <div class="stat">🏛️ Belediye Binası: <span id="th-txt">1</span>. Seviye</div>
        <br>
        <button onclick="madenleriTopla()">Madenleri Topla (Yenile)</button>
    </div>

    <script>
        let aktifKullanici = "";
        let aktifSifre = "";

        function oyunaGir() {
            const isim = document.getElementById('username').value;
            const sifre = document.getElementById('password').value;
            if(!isim || !sifre) return alert("Kullanıcı adı ve şifre yazmalısın!");
            
            aktifKullanici = isim;
            aktifSifre = sifre;
            verileriGonder();
        }

        function verileriGonder() {
            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: aktifKullanici, password: aktifSifre })
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    alert(data.error); // Şifre yanlışsa uyarı ver
                } else {
                    document.getElementById('login-box').style.display = 'none';
                    document.getElementById('koy-box').style.display = 'block';
                    
                    document.getElementById('koy-sahibi').innerText = data.player.username;
                    document.getElementById('gold-txt').innerText = data.player.gold;
                    document.getElementById('elixir-txt').innerText = data.player.elixir;
                    document.getElementById('th-txt').innerText = data.player.town_hall;
                }
            });
        }

        function madenleriTopla() {
            verileriGonder();
        }
    </script>
</body>
</html>
